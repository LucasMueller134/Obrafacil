name: obra_facil
description: App de gestão de obras para construção civil
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10

  # Banco local (offline)
  drift: ^2.14.1
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.9.0

  # Estado
  provider: ^6.1.1

  # Navegação
  go_router: ^13.0.1

  # UI
  fl_chart: ^0.66.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0

  # Audio / IA
  record: ^5.0.4
  audioplayers: ^6.0.0
  http: ^1.2.0
  dio: ^5.4.1

  # Utilitários
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.0.2
  permission_handler: ^11.3.0
  file_picker: ^8.0.0
  open_file: ^3.3.2
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^9.0.0
  flutter_local_notifications: ^17.0.0
  workmanager: ^0.5.2
  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.14.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
