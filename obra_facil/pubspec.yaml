name: obra_facil
description: >-
  Gestão inteligente de obras na palma da mão — controle de custos, equipe e
  progresso com IA on-device. TCC de Engenharia de Software (CatólicaSC).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase (nuvem + sincronização offline nativa do Firestore)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Estado e navegação
  provider: ^6.1.2
  go_router: ^14.3.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0

  # Câmera e processamento de imagem
  image_picker: ^1.1.2
  image: ^4.2.0

  # IA on-device
  google_mlkit_text_recognition: ^0.14.0 # OCR de notas fiscais (offline)
  google_mlkit_image_labeling: ^0.13.0 # reconhecimento de materiais (offline)
  speech_to_text: ^7.0.0 # lançamento por voz

  # Notificações fora do app
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  flutter_timezone: ^4.0.0
  workmanager: ^0.9.0 # verificador em segundo plano (aprovações, alertas)
  shared_preferences: ^2.3.0

  # Utilitários
  intl: any # versão gerenciada pelo flutter_localizations
  uuid: ^4.5.1
  share_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

# Ícone do launcher — gerado no CI com: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icone/icon.png
  adaptive_icon_background: '#F97316'
  adaptive_icon_foreground: assets/icone/icon_foreground.png

# Splash nativa — gerada no CI com: dart run flutter_native_splash:create
flutter_native_splash:
  color: '#0F172A'
  image: assets/icone/splash.png
  android_12:
    color: '#0F172A'
    image: assets/icone/splash.png
