# Compila o APK do ObraFácil na nuvem a cada push na master.
#
# Por que o scaffold Android é gerado aqui e não commitado: a máquina local
# está atrás de firewall (FortiNet) que bloqueia o pub.dev, então o
# `flutter create` roda no runner. Isso também garante que o scaffold sempre
# combina com a versão do Flutter usada no build.
#
# O APK sai na aba "Releases" do repositório — dá para baixar direto pelo
# navegador do celular e instalar.
name: Build APK

on:
  push:
    branches: [master, main]
  workflow_dispatch: {} # permite disparar manualmente pela aba Actions

permissions:
  contents: write # necessário para publicar a Release com o APK

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obra_facil
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Gerar scaffold Android
        run: |
          flutter create . --platforms android --org br.com.obrafacil --project-name obra_facil
          # o flutter create cria um widget_test.dart de exemplo que não compila com o nosso app
          rm -f test/widget_test.dart

      - name: Ajustar minSdk, permissões e nome do app
        run: |
          # firebase_auth exige Android 6.0+ (minSdk 23)
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' android/app/build.gradle
          fi
          # desliga a minificação R8 no release: o plugin de OCR referencia
          # classes de idiomas (chinês/japonês/coreano) que não incluímos,
          # e o R8 falha com "missing classes" ao tentar encolher o app
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/signingConfig = signingConfigs.getByName("debug")/signingConfig = signingConfigs.getByName("debug")\n            isMinifyEnabled = false\n            isShrinkResources = false/' android/app/build.gradle.kts
            grep -A4 'release {' android/app/build.gradle.kts || true
          fi
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # nome exibido no launcher
          sed -i 's/android:label="obra_facil"/android:label="ObraFácil"/' "$MANIFEST"
          # permissões: internet (Firebase) e microfone (lançamento por voz);
          # queries para o serviço de reconhecimento de fala (Android 11+)
          sed -i 's#<manifest xmlns:android="http://schemas.android.com/apk/res/android">#<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>\n    <queries>\n        <intent>\n            <action android:name="android.speech.RecognitionService"/>\n        </intent>\n    </queries>#' "$MANIFEST"
          echo "--- Manifest final ---"
          cat "$MANIFEST"
          # flutter_local_notifications exige core library desugaring
          cat >> android/app/build.gradle.kts <<'EOF'

android {
    compileOptions {
        isCoreLibraryDesugaringEnabled = true
    }
}

dependencies {
    add("coreLibraryDesugaring", "com.android.tools:desugar_jdk_libs:2.1.4")
}
EOF

      - name: Dependências
        run: flutter pub get

      - name: Ícone do app e splash nativa
        run: |
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Testes unitários (parsers e IA)
        run: flutter test

      - name: Análise estática
        run: flutter analyze

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Renomear APK
        run: cp build/app/outputs/flutter-apk/app-release.apk obrafacil-${{ github.run_number }}.apk

      - name: Publicar na aba Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: 'ObraFácil build ${{ github.run_number }}'
          body: 'APK gerado automaticamente do commit ${{ github.sha }}'
          files: obra_facil/obrafacil-${{ github.run_number }}.apk

      - name: Guardar APK como artefato (backup)
        uses: actions/upload-artifact@v4
        with:
          name: obrafacil-apk
          path: obra_facil/obrafacil-${{ github.run_number }}.apk
